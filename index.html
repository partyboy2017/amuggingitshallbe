<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Lookup & Logger</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #ffffff;
            --accent-color: #3498db;
            --success-color: #2ecc71;
            --input-bg: #111;
            --border-color: #444;
        }
 
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
 
        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
        }
 
        h2 {
            margin-top: 0;
            text-align: center;
            color: var(--accent-color);
        }
 
        .section-label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
            margin-bottom: 5px;
            margin-top: 15px;
        }
 
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
 
        input[type="password"], input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background-color: var(--input-bg);
            color: #fff;
            font-size: 16px;
        }
 
        button {
            padding: 10px 20px;
            background-color: var(--accent-color);
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
 
        button:hover {
            background-color: #2980b9;
        }
 
        .error {
            color: #e74c3c;
            margin-top: 15px;
            margin-bottom: 15px;
            display: none;
            font-weight: bold;
        }
 
        .log-status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 4px;
            background-color: #1b3a24;
            color: #2ecc71;
            text-align: center;
            font-size: 14px;
            display: none;
        }
 
        #resultCard {
            display: none;
            border-top: 2px solid var(--border-color);
            padding-top: 20px;
            margin-top: 20px;
        }
 
        .data-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #3d3d3d;
        }
 
        .data-row:last-child {
            border-bottom: none;
        }
 
        .label {
            color: #aaa;
            font-weight: bold;
        }
 
        .value {
            color: var(--success-color);
        }
 
        .value a {
            color: var(--accent-color);
            text-decoration: none;
        }
        .value a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
 
<div class="container">
    <h2>Player Lookup & Logger</h2>
    
    <label class="section-label" for="apiKey">Torn API Key</label>
    <div class="input-group">
        <input type="password" id="apiKey" placeholder="Paste your API key here...">
    </div>
 
    <label class="section-label" for="playerId">Target Player ID</label>
    <div class="input-group">
        <input type="text" id="playerId" placeholder="Enter Numeric Player ID...">
        <button onclick="fetchAndLogData()">Fetch & Log</button>
    </div>
 
    <div id="errorMessage" class="error"></div>
    <div id="logStatus" class="log-status"></div>
 
    <div id="resultCard">
        <div class="data-row">
            <span class="label">Name:</span>
            <span class="value" id="resName">-</span>
        </div>
        <div class="data-row">
            <span class="label">Level:</span>
            <span class="value" id="resLevel">-</span>
        </div>
        <div class="data-row">
            <span class="label">Faction:</span>
            <span class="value" id="resFaction">-</span>
        </div>
        <div class="data-row">
            <span class="label">Job/Company:</span>
            <span class="value" id="resJob">-</span>
        </div>
        <div class="data-row">
            <span class="label">Status:</span>
            <span class="value" id="resStatus">-</span>
        </div>
        <div class="data-row">
            <span class="label">Life:</span>
            <span class="value" id="resLife">-</span>
        </div>
        <div class="data-row">
            <span class="label">Last Action:</span>
            <span class="value" id="resLastAction">-</span>
        </div>
        <div class="data-row">
            <span class="label">Profile Link:</span>
            <span class="value" id="resLink">-</span>
        </div>
    </div>
</div>
 
<script>
    const GOOGLE_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbybt867HbypElbcUfckR_CPJxxbugnppYonBDXJ-OgVgnM-19OgMUnn7brwR1QpwLCa/exec';
 
    document.addEventListener('DOMContentLoaded', () => {
        const savedKey = localStorage.getItem('torn_api_key');
        if (savedKey) document.getElementById('apiKey').value = savedKey;
    });
 
    async function fetchAndLogData() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const playerId = document.getElementById('playerId').value.trim();
        const errorDiv = document.getElementById('errorMessage');
        const logStatusDiv = document.getElementById('logStatus');
        const card = document.getElementById('resultCard');
 
        errorDiv.style.display = 'none';
        logStatusDiv.style.display = 'none';
        card.style.display = 'none';
 
        if (!apiKey || !playerId) {
            showError('Both API Key and Player ID are required.');
            return;
        }
 
        localStorage.setItem('torn_api_key', apiKey);
 
        const profileUrl = `https://api.torn.com/user/${playerId}?selections=profile&key=${apiKey}`;
 
        try {
            const profileRes = await fetch(profileUrl);
 
            if (!profileRes.ok) throw new Error('Torn API communication failure.');
 
            const profileData = await profileRes.json();
 
            if (profileData.error) {
                showError(`Torn API Error: ${profileData.error.error}`);
                return;
            }
 
            // Extract variables
            const pName       = profileData.name;
            const pLevel      = profileData.level;
            const pStatus     = profileData.status ? profileData.status.description : 'Unknown';
            const pLife       = profileData.life ? profileData.life.current : 'N/A';
            const pFaction    = profileData.faction && profileData.faction.faction_name
                                  ? `${profileData.faction.faction_name} [${profileData.faction.faction_id}]`
                                  : 'None';
            const pJob        = profileData.job && profileData.job.company_name
                                  ? profileData.job.company_name
                                  : (profileData.job && profileData.job.position ? profileData.job.position : 'None');
            const pProfileUrl = `https://www.torn.com/profiles.php?XID=${profileData.player_id}`;
            const pLastAction = profileData.last_action
                                  ? `${profileData.last_action.relative} (${profileData.last_action.status})`
                                  : 'Unknown';
 
            // Update UI
            document.getElementById('resName').textContent       = `${pName} [${profileData.player_id}]`;
            document.getElementById('resLevel').textContent      = pLevel;
            document.getElementById('resFaction').textContent    = pFaction;
            document.getElementById('resJob').textContent        = pJob;
            document.getElementById('resStatus').textContent     = pStatus;
            document.getElementById('resLife').textContent       = pLife;
            document.getElementById('resLastAction').textContent = pLastAction;
            document.getElementById('resLink').innerHTML         = `<a href="${pProfileUrl}" target="_blank">Open Profile</a>`;
            card.style.display = 'block';
 
            // Send to Google Sheet
            if (GOOGLE_WEB_APP_URL) {
                logStatusDiv.textContent = "Logging to sheet...";
                logStatusDiv.style.backgroundColor = "#2a4d6c";
                logStatusDiv.style.color = "#00d2ff";
                logStatusDiv.style.display = "block";
 
                const params = new URLSearchParams({
                    playerId:   profileData.player_id,
                    name:       pName,
                    level:      pLevel,
                    faction:    pFaction,
                    job:        pJob,
                    status:     pStatus,
                    life:       pLife,
                    lastAction: pLastAction,
                    profileUrl: pProfileUrl
                });
 
                await fetch(GOOGLE_WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params.toString()
                });
 
                logStatusDiv.textContent = "✓ Lookup successful!";
                logStatusDiv.style.backgroundColor = "#1b3a24";
                logStatusDiv.style.color = "#2ecc71";
            }
 
        } catch (error) {
            showError('An error occurred during execution. Check network or URLs.');
            console.error(error);
        }
    }
 
    function showError(message) {
        const errorDiv = document.getElementById('errorMessage');
        errorDiv.textContent = message;
        errorDiv.style.display = 'block';
    }
</script>
 
</body>
</html>
